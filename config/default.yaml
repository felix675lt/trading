# AutoTrader AI Configuration

exchanges:
  binance:
    api_key: ${BINANCE_API_KEY}
    secret: ${BINANCE_SECRET}
    testnet: false
    options:
      defaultType: future
  bybit:
    api_key: ${BYBIT_API_KEY}
    secret: ${BYBIT_SECRET}
    testnet: true
    options:
      defaultType: future

trading:
  symbols:
    - "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "DOGE/USDT:USDT"
  timeframes:
    - "5m"
    - "15m"
    - "1h"
    - "4h"
  leverage: 3
  mode: "dual"  # backtest / paper / live / dual (Paper+Live 동시)
  min_confidence: 0.30     # 최소 확신도 (적응형: 장기 hold 시 0.15까지 자동 하향)
  signal_threshold: 0.08   # ML 시그널 방향 결정 임계값

risk:
  max_position_pct: 0.20        # $188 × 20% = $37.60 마진 (멀티심볼 분산)
  min_order_notional: 5         # 알트코인 최소 $5 (BTC: $37.60 × 3x = $112.80 > $100)
  max_daily_loss_pct: 0.05
  max_drawdown_pct: 0.15
  stop_loss_pct: 0.02
  take_profit_pct: 0.04
  max_open_positions: 4         # 심볼당 최대 1포지션
  cooldown_after_losses: 2
  cooldown_minutes: 30
  dynamic_leverage:
    enabled: true
    base: 3                     # $60 마진 × 3배 = $180 notional
    min: 2                      # 최소 2배 ($60 × 2 = $120 notional)
    max: 5                      # 최대 5배 ($60 × 5 = $300 notional)

trailing_stop:
  activate_pct: 0.02    # 2% 수익 도달 시 트레일링 활성화
  distance_pct: 0.015   # 최고점에서 1.5% 하락 시 청산
  step_pct: 0.005        # SL을 0.5% 단위로 끌어올림

ml:
  retrain_interval_hours: 24
  lookback_days: 90
  train_split: 0.8
  min_accuracy: 0.55
  features:
    - rsi
    - macd
    - bbands
    - atr
    - volume_profile
    - funding_rate

rl:
  total_timesteps: 100000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  gamma: 0.99
  reward_type: "sharpe"

backtest:
  initial_capital: 200
  commission_pct: 0.0004
  slippage_pct: 0.0001
  start_date: "2024-01-01"
  end_date: "2025-01-01"

external:
  enabled: true
  weight: 0.3              # 외부 요인이 최종 결정에 미치는 가중치 (0~1)
  update_interval_min: 15   # 외부 데이터 업데이트 주기 (분)
  sources:
    fear_greed: true
    news: true
    sentiment: true
    onchain: true
    macro: true
    social: true
    seasonal_cycle: true      # 10년 BTC 계절 패턴 (반감기/Dec-Feb 반등)
    derivatives: true          # 펀딩비/OI/롱숏비율 (Binance)
    multi_timeframe: true      # 멀티타임프레임 합류 분석
  sentiment:
    method: "vader"         # vader (경량) / keyword (초경량)
    crypto_lexicon: true    # 크립토 특화 사전 사용
  signal_thresholds:
    strong_bullish: 0.3     # 강한 매수 신호
    strong_bearish: -0.3    # 강한 매도 신호
    event_override: true    # 고임팩트 이벤트 시 기술적 분석 오버라이드

dashboard:
  host: "0.0.0.0"
  port: 8888

logging:
  level: "INFO"
  file: "logs/autotrader.log"
