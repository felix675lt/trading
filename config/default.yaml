# AutoTrader AI Configuration
# === 소시드 집중 스캘핑 모드 ($188) ===

exchanges:
  binance:
    api_key: ${BINANCE_API_KEY}
    secret: ${BINANCE_SECRET}
    testnet: false
    options:
      defaultType: future
  # bybit 제거됨 (2026-04-20) — 사용자가 바이낸스만 사용

trading:
  symbols:
    # fallback — tier/mode override가 있으면 그쪽 사용
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "DOGE/USDT:USDT"

  # === Mode별 심볼 오버라이드 (2026-04-18) ===
  # PAPER: BTC/ETH 위주 (안정성 우선, LIVE와 동일 체결 조건으로 현실 검증)
  paper_symbols_override:
    - "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
  # LIVE: 엣지 검증된 메이저만 (수학적 최적화 2026-04-20)
  #   알트 투기 제거 — whitelist와 동일
  live_symbols_override:
    - "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "DOGE/USDT:USDT"

  timeframes:
    - "5m"
    - "15m"
    - "1h"
    - "4h"
  leverage: 3
  mode: "dual"  # backtest / paper / live / dual (Paper+Live 동시)
  min_confidence: 0.40     # 최소 확신도 (PAPER 기준, 적응형: 장기 hold 시 0.25까지 하향)
  signal_threshold: 0.10   # ML 시그널 방향 결정 임계값
  min_confirming_signals: 2  # 최소 2개 시그널 합의 필요 (다중확인)

  # === 집중 매매 모드 ===
  # 소시드($188)에서는 분산 X → 가장 강한 신호 1개에 풀시드 집중
  concentration_mode: true
  max_concurrent_live: 1   # LIVE: 한 번에 1포지션만 (풀시드 올인)
  max_concurrent_paper: 4  # PAPER: 학습용으로 다중 가능

  # === 방향 필터 (사용자 지시, 2026-04-17) ===
  # PAPER: 롱숏 모두 허용 (학습 데이터 수집) — 현재 횡보장 판단
  # LIVE : 롱만 진입 (숏 승률 24%, 롱 승률 93% — 실거래는 롱으로 고정)
  # long_only: true 는 PAPER까지 숏 차단 (강력 모드, 비권장)
  long_only: false
  live_long_only: true

  # === LIVE 수학적 최적화 모드 (2026-04-20 재조정) ===
  # 최근 empirical: WR 34%, avg_win $1.3, avg_loss $2.3 → BE_WR 64%, EV -$0.96/trade
  # 진단: 신뢰도 게이트 0.55 도달한 시그널도 실제 WR는 34% → 모델 calibration 문제
  # 수정: (1) 게이트 0.62로 BE_WR에 수렴, (2) RR 2.5:1 강제로 BE_WR 28.6%로 하향
  # 둘이 만나는 지점에서 EV 양수화 — 수학적으로 일관된 접근
  live_aggressive_long: false       # 공격 롱 완전 OFF
  live_min_confidence: 0.62        # 0.55 → 0.62 (BE_WR 64%에 근접, 노이즈 구간 회피)
  live_long_conf_boost: 1.00       # 인공 부스트 없음
  live_disable_macro_block: false  # 매크로 필터 ON
  live_quant_score_min: 0.25       # |quant_alpha_score| ≥ 0.25 강제 (엣지 없는 구간 차단)
  live_symbol_whitelist:           # 실거래 심볼 엄격 제한 — 알트 투기 차단
    - "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "DOGE/USDT:USDT"

  # === Kelly 분수 기반 포지션 사이징 (2026-04-20 신설) ===
  # f* = (p·b − q) / b, where b=win/loss_ratio, p=WR, q=1−p
  # 최근 empirical로 f* 계산 후 1/4-Kelly cap (표준 risk-averse)
  # f* ≤ 0 (negative edge)이면 min_size로 떨어짐 — 학습 지속 가능
  kelly_sizing:
    enabled: true
    fraction: 0.25                  # 1/4-Kelly (보수)
    lookback_trades: 50             # 최근 50트레이드 empirical로 WR/RR 추정
    min_size_pct: 0.10              # f*≤0일 때 최소 10% (탐색 유지)
    max_size_pct: 0.50              # f*>0일 때 상한 50% (과집중 방지)

  # === $100K 타겟 ===
  # 전체 시스템이 이 목표를 향해 공격성 자동 조절
  #   < $1K : 극공격 (Kelly 0.35)
  #   $1~10K: 공격 (Kelly 0.25)
  #   $10~50K: 적극 (Kelly 0.20)
  #   $50K~ : 보수 (Kelly 0.12) — 수확 모드
  target_equity: 100000

# === BTC Treasury Reserve (2026-04-18) ===
# 선물 실현수익의 일정 비율을 자동으로 현물 BTC로 전환하는 "디지털 금고".
# 철학: 달러는 강력하지만 세계 재편 과정에서 BTC도 준비자산 자리를 가질 수 있음.
# 적립된 BTC는 트레이딩에 사용하지 않음 (장기 보유 원칙).
treasury:
  btc_reserve:
    enabled: true
    paper_simulate: true            # paper 모드에서도 가상 적립 (시뮬레이션)
    # 티어별 적립률 — 시드가 작을수록 복리우선(적게 떼고), 커질수록 수확 비중 ↑
    allocation_by_tier:
      micro: 0.10                   # $0~$500: 실현수익의 10%
      small: 0.15                   # $500~$2K: 15%
      mid:   0.20                   # $2K~$10K: 20%
      large: 0.25                   # $10K~$50K: 25%
      pro:   0.30                   # $50K+: 30%
    fallback_allocation: 0.15       # 티어 식별 실패 시
    # 수수료 드래그 방지 임계값
    min_profit_usdt: 5.0            # 실현수익이 $5 미만이면 전환 스킵
    min_order_usdt: 11.0            # Binance spot 최소 주문 $10 + 여유
    spot_symbol: "BTC/USDT"         # Binance 현물 심볼
    reserve_file: "data/btc_reserve.json"

risk:
  max_position_pct: 0.95        # 풀시드 집중: $188 × 95% = $178.6 마진
  min_order_notional: 5         # 알트코인 최소 $5
  max_daily_loss_pct: 0.04      # 0.06 → 0.04 (수학적: EV<0 구간에선 위축 필요)
  max_drawdown_pct: 0.15        # 0.20 → 0.15 (MDD 타이트닝)
  stop_loss_pct: 0.020          # 0.015 → 0.020 (ATR 없을 때 fallback)
  take_profit_pct: 0.050        # 0.030 → 0.050 (RR 2.5:1 — 수학적 BE_WR 28.6%)
  max_open_positions: 1         # LIVE 1포지션 제한
  cooldown_after_losses: 2      # 3 → 2 (EV<0일 땐 쉬어가기)
  cooldown_minutes: 30          # 20 → 30 (노이즈 구간 회피)

  # === ATR 기반 동적 SL/TP (수학적 재조정 2026-04-20) ===
  # 최근 empirical: avg_win $1.3 vs avg_loss $2.3 → BE_WR 64% (도달 불가)
  # 수정: SL floor 2% (1σ 노이즈 밖), TP/SL RR 2.5:1 최소 → BE_WR 28.6%
  atr_sl_multiplier: 3.0        # 2.5 → 3.0 (SL을 3σ 밖 = 노이즈 안전)
  atr_tp_multiplier: 7.5        # 4.0 → 7.5 (RR 2.5:1 수학적 필수 조건)
  sl_floor_pct: 0.020           # 0.015 → 0.020 (최소 2% — 1.5σ 노이즈 내성)
  sl_cap_pct: 0.045             # 0.040 → 0.045 (상한 확대)
  tp_floor_pct: 0.050           # 신설 — TP 최소 5% (RR 2.5:1 강제)
  min_rr_ratio: 2.5             # 신설 — 모든 SL/TP에 대해 최소 RR 2.5:1 강제

  dynamic_leverage:
    enabled: true
    base: 2                     # 레버리지 보수 — SL 히트 시 margin 충격 완화
    min: 2
    max: 3                      # 상한 3x (Kelly 분수 계산과 매칭)

  # === 종목별 스캘핑 프로파일 (수학적 재조정 2026-04-20) ===
  # 모든 프로파일 RR ≥ 2.5:1 강제 (EV 양수 조건: WR > 28.6%)
  # SL은 각 심볼 15m ATR × 2.5~3.0 기준 (노이즈 밖)
  scalp_profiles:
    BTC:
      tp_pct: 0.040       # 4.0% TP (1.8 → 4.0)
      sl_pct: 0.016       # 1.6% SL (1.0 → 1.6) | RR 2.5:1
      priority: 2
    ETH:
      tp_pct: 0.045       # 4.5% TP (2.0 → 4.5)
      sl_pct: 0.018       # 1.8% SL (1.2 → 1.8) | RR 2.5:1
      priority: 3
    SOL:
      tp_pct: 0.055       # 5.5% TP (2.5 → 5.5)
      sl_pct: 0.022       # 2.2% SL (1.5 → 2.2) | RR 2.5:1
      priority: 1
    DOGE:
      tp_pct: 0.060       # 6.0% TP (2.5 → 6.0)
      sl_pct: 0.024       # 2.4% SL (1.5 → 2.4) | RR 2.5:1
      priority: 4

trailing_stop:
  # fallback (trade_profiles 없을 때) — 수학적 재조정 2026-04-20
  activate_pct: 0.025      # 0.015 → 0.025 (2.5% 수익 확보 후 트레일링 시작)
  distance_pct: 0.015      # 0.008 → 0.015 (1.5% 간격, 찔끔 청산 방지)
  step_pct: 0.005

# === 수학적 최적화 전략 (2026-04-20 재조정) ===
# 목표: EV 양수화 (현 -$0.96/trade → +값)
# 수단: RR 2.5:1 강제 + SL widening + trailing stop 늦추기
trade_profiles:
  scalp:
    sources: ["ML", "ML_val", "MOM", "RSI_extreme", "RL", "EXT", "EXT_boost"]
    max_risk_pct: 0.04     # 0.06 → 0.04 (Kelly 분수 고려 — EV<0 구간에선 축소)
    sl_pct: 0.020          # 0.015 → 0.020 SL
    tp_pct: 0.050          # 0.030 → 0.050 TP (RR 2.5:1)
    sl_floor_pct: 0.020    # 0.015 → 0.020
    sl_cap_pct: 0.030      # 0.025 → 0.030
    atr_sl_multiplier: 3.0  # 2.0 → 3.0 (3σ 노이즈 밖)
    atr_tp_multiplier: 7.5  # 4.0 → 7.5 (RR 2.5:1 매칭)
    trailing:
      activate_pct: 0.025   # 0.015 → 0.025 (2.5% 수익 확보 후 시작)
      distance_pct: 0.015   # 0.012 → 0.015 (찔끔 방지 강화)
      step_pct: 0.005
    max_hold_minutes: 240   # 4시간 유지

ml:
  retrain_interval_hours: 24
  lookback_days: 2400    # 크립토 선물 전체 역사 (~2019-11~)
  train_split: 0.8
  min_accuracy: 0.55
  features:
    - rsi
    - macd
    - bbands
    - atr
    - volume_profile
    - funding_rate

rl:
  total_timesteps: 100000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  gamma: 0.99
  reward_type: "sharpe"

backtest:
  initial_capital: 200
  commission_pct: 0.0004
  slippage_pct: 0.0001
  start_date: "2024-01-01"
  end_date: "2025-01-01"

external:
  enabled: true
  weight: 0.2              # 외부 요인 가중치 완화 (0.3→0.2, 매크로 영향 축소)
  update_interval_min: 15
  sources:
    # fear_greed 제거됨 (후행지표, 예측력 없음 — 2026-04-20)
    news: true
    sentiment: true
    onchain: true
    macro: true
    social: true
    seasonal_cycle: true      # 10년 BTC 계절 패턴 (반감기/Dec-Feb 반등)
    derivatives: true          # 펀딩비/OI/롱숏비율 (Binance)
    multi_timeframe: true      # 멀티타임프레임 합류 분석
  sentiment:
    method: "vader"
    crypto_lexicon: true
  signal_thresholds:
    strong_bullish: 0.4     # 0.3 → 0.4 (더 강해야 신호로 인정)
    strong_bearish: -0.4    # 0.3 → 0.4
    event_override: false   # 고임팩트 오버라이드 해제 — 매크로가 진입 방해하지 않게

# =============================================================================
# Capital Tier System — 시드 구간별 기능 자동 활성화
# =============================================================================
# 실 LIVE 잔고가 커지면 상위 티어 기능이 자동으로 켜진다.
# PAPER는 paper_virtual_seed (가상 시드)로 상위 티어 기능을 실시간으로
# 선행 검증 — 실 자본 투입 전에 Kelly/HMM/메타라벨링을 paper에서 증명.
#
# 현재: LIVE=~$100 (micro 티어) / PAPER=$10K 가상 (mid 티어) → Kelly+BTC 검증
# =============================================================================
capital_tiers:
  # PAPER가 가정하는 가상 시드 ($). 상위 티어 기능을 실시간 시장에서 검증.
  # $5K → mid 티어 (Kelly + BTC + CVaR)를 먼저 paper로 증명 후 $15K→large로 상향 권장
  paper_virtual_seed: 5000
  paper_use_virtual: true     # false면 PAPER 실 equity로 티어 결정

  tiers:
    - name: micro
      min: 0
      max: 500
      description: "소시드 집중매매 ($0~$500) — 1포지션 풀시드, 알트 위주 공격 롱"
      features:
        symbols: ["ETH/USDT:USDT", "SOL/USDT:USDT", "DOGE/USDT:USDT"]
        max_positions: 1
        concentration_mode: true
        sizing_method: kelly_fractional   # micro부터 Kelly 활성 ($100K 빠른 도달)
        order_routing: market_only
        kelly_enabled: true
        kelly_fraction: 0.35              # 공격적 (낮은 시드 = 빠른 성장 필요)
        limit_order_pref: false
        hmm_regime: false
        meta_labeling: false
        walk_forward_cv: false
        cvar_risk: false
        stat_arb_pairs: false
        max_leverage: 3                   # 공격 롱은 레버리지 낮추고 holding으로

    - name: small
      min: 500
      max: 2000
      description: "소형 시드 ($500~$2K) — 2포지션 + 알트 확장"
      features:
        symbols: ["ETH/USDT:USDT", "SOL/USDT:USDT", "DOGE/USDT:USDT", "XRP/USDT:USDT"]
        max_positions: 2
        concentration_mode: false
        sizing_method: kelly_fractional
        order_routing: limit_first
        kelly_enabled: true
        kelly_fraction: 0.30
        limit_order_pref: true
        hmm_regime: false
        meta_labeling: false
        walk_forward_cv: true
        cvar_risk: false
        stat_arb_pairs: false
        max_leverage: 3

    - name: mid
      min: 2000
      max: 10000
      description: "중형 시드 ($2K~$10K) — Kelly + BTC 재진입 + CVaR"
      features:
        symbols: ["BTC/USDT:USDT", "ETH/USDT:USDT", "SOL/USDT:USDT", "DOGE/USDT:USDT", "XRP/USDT:USDT"]
        max_positions: 3
        concentration_mode: false
        sizing_method: kelly_fractional
        order_routing: limit_first
        kelly_enabled: true
        kelly_fraction: 0.25
        limit_order_pref: true
        hmm_regime: false
        meta_labeling: false
        walk_forward_cv: true
        cvar_risk: true
        stat_arb_pairs: false
        max_leverage: 3

    - name: large
      min: 10000
      max: 50000
      description: "대형 시드 ($10K~$50K) — HMM + 메타라벨링 + TWAP + 적극 모드"
      features:
        symbols:
          - "BTC/USDT:USDT"
          - "ETH/USDT:USDT"
          - "SOL/USDT:USDT"
          - "DOGE/USDT:USDT"
          - "BNB/USDT:USDT"
          - "XRP/USDT:USDT"
        max_positions: 5
        concentration_mode: false
        sizing_method: kelly_fractional
        order_routing: twap
        kelly_enabled: true
        kelly_fraction: 0.20            # 0.30 → 0.20 (시드↑ = 보수화)
        limit_order_pref: true
        hmm_regime: true
        meta_labeling: true
        walk_forward_cv: true
        cvar_risk: true
        stat_arb_pairs: false
        max_leverage: 3

    - name: pro
      min: 50000
      max: .inf
      description: "프로 ($50K+) — 풀 포트폴리오 + 통계차익 + 수확 모드($100K→)"
      features:
        symbols:
          - "BTC/USDT:USDT"
          - "ETH/USDT:USDT"
          - "SOL/USDT:USDT"
          - "DOGE/USDT:USDT"
          - "BNB/USDT:USDT"
          - "XRP/USDT:USDT"
          - "AVAX/USDT:USDT"
          - "ARB/USDT:USDT"
        max_positions: 8
        concentration_mode: false
        sizing_method: hrp
        order_routing: smart
        kelly_enabled: true
        kelly_fraction: 0.12             # 0.35 → 0.12 (수확 모드, $100K 타겟 달성 근접)
        limit_order_pref: true
        hmm_regime: true
        meta_labeling: true
        walk_forward_cv: true
        cvar_risk: true
        stat_arb_pairs: true
        max_leverage: 3

dashboard:
  host: "0.0.0.0"
  port: 8888

logging:
  level: "INFO"
  file: "logs/autotrader.log"
