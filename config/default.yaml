# AutoTrader AI Configuration
# === 소시드 집중 스캘핑 모드 ($188) ===

exchanges:
  binance:
    api_key: ${BINANCE_API_KEY}
    secret: ${BINANCE_SECRET}
    testnet: false
    options:
      defaultType: future
  # bybit 제거됨 (2026-04-20) — 사용자가 바이낸스만 사용

trading:
  symbols:
    # fallback — tier/mode override가 있으면 그쪽 사용
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "DOGE/USDT:USDT"

  # === Mode별 심볼 오버라이드 (2026-04-18) ===
  # PAPER: BTC/ETH 위주 (안정성 우선, LIVE와 동일 체결 조건으로 현실 검증)
  paper_symbols_override:
    - "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
  # LIVE: 알트 위주 (낮은 시드 → 변동성 기반 공격 롱)
  #   티어 상승 시 tier.symbols에서 자동으로 더 많은 알트 추가됨
  live_symbols_override:
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "DOGE/USDT:USDT"

  timeframes:
    - "5m"
    - "15m"
    - "1h"
    - "4h"
  leverage: 3
  mode: "dual"  # backtest / paper / live / dual (Paper+Live 동시)
  min_confidence: 0.40     # 최소 확신도 (PAPER 기준, 적응형: 장기 hold 시 0.25까지 하향)
  signal_threshold: 0.10   # ML 시그널 방향 결정 임계값
  min_confirming_signals: 2  # 최소 2개 시그널 합의 필요 (다중확인)

  # === 집중 매매 모드 ===
  # 소시드($188)에서는 분산 X → 가장 강한 신호 1개에 풀시드 집중
  concentration_mode: true
  max_concurrent_live: 1   # LIVE: 한 번에 1포지션만 (풀시드 올인)
  max_concurrent_paper: 4  # PAPER: 학습용으로 다중 가능

  # === 방향 필터 (사용자 지시, 2026-04-17) ===
  # PAPER: 롱숏 모두 허용 (학습 데이터 수집) — 현재 횡보장 판단
  # LIVE : 롱만 진입 (숏 승률 24%, 롱 승률 93% — 실거래는 롱으로 고정)
  # long_only: true 는 PAPER까지 숏 차단 (강력 모드, 비권장)
  long_only: false
  live_long_only: true

  # === LIVE 공격 롱 모드 (2026-04-21 보수화) ===
  # 이전(04-18): live_min_confidence=0.30, boost=1.25, 매크로차단해제=True
  # 결과: 최근 10건 전패 → 자가진단 LIVE 일시정지 반복 발동 (4월 중순 이후 LIVE 연속 적자)
  # 원인: min_conf 0.30은 3-class 분류 random(0.33)과 거의 동일 → 필터링 무효
  # 수정: 기본 모드로 복귀 (live_aggressive_long=false), 보조 파라미터는 보수값으로.
  live_aggressive_long: false       # ON(true) 시 아래 파라미터 적용; 현재 OFF
  live_min_confidence: 0.55        # 0.30 → 0.55 (ML 통계적 우위 구간)
  live_long_conf_boost: 1.00       # 1.25 → 1.00 (인공 부스트 제거)
  live_disable_macro_block: false  # true → false (매크로 필터 복구)

  # === $100K 타겟 ===
  # 전체 시스템이 이 목표를 향해 공격성 자동 조절
  #   < $1K : 극공격 (Kelly 0.35)
  #   $1~10K: 공격 (Kelly 0.25)
  #   $10~50K: 적극 (Kelly 0.20)
  #   $50K~ : 보수 (Kelly 0.12) — 수확 모드
  target_equity: 100000

# === BTC Treasury Reserve (2026-04-18) ===
# 선물 실현수익의 일정 비율을 자동으로 현물 BTC로 전환하는 "디지털 금고".
# 철학: 달러는 강력하지만 세계 재편 과정에서 BTC도 준비자산 자리를 가질 수 있음.
# 적립된 BTC는 트레이딩에 사용하지 않음 (장기 보유 원칙).
treasury:
  btc_reserve:
    enabled: true
    paper_simulate: true            # paper 모드에서도 가상 적립 (시뮬레이션)
    # 티어별 적립률 — 시드가 작을수록 복리우선(적게 떼고), 커질수록 수확 비중 ↑
    allocation_by_tier:
      micro: 0.10                   # $0~$500: 실현수익의 10%
      small: 0.15                   # $500~$2K: 15%
      mid:   0.20                   # $2K~$10K: 20%
      large: 0.25                   # $10K~$50K: 25%
      pro:   0.30                   # $50K+: 30%
    fallback_allocation: 0.15       # 티어 식별 실패 시
    # 수수료 드래그 방지 임계값
    min_profit_usdt: 5.0            # 실현수익이 $5 미만이면 전환 스킵
    min_order_usdt: 11.0            # Binance spot 최소 주문 $10 + 여유
    spot_symbol: "BTC/USDT"         # Binance 현물 심볼
    reserve_file: "data/btc_reserve.json"

risk:
  max_position_pct: 0.95        # 풀시드 집중: $188 × 95% = $178.6 마진
  min_order_notional: 5         # 알트코인 최소 $5
  max_daily_loss_pct: 0.06      # 일 최대 손실 6% (공격 모드 완화)
  max_drawdown_pct: 0.20        # MDD 20% (공격 모드 완화)
  stop_loss_pct: 0.015          # 1.5% SL (fallback — ATR 없을 때만)
  take_profit_pct: 0.030        # 3.0% TP (fallback — ATR 없을 때만)
  max_open_positions: 1         # LIVE 1포지션 제한
  cooldown_after_losses: 3      # 2→3 (공격 모드 — 손절 후 쿨다운 완화)
  cooldown_minutes: 20          # 30→20

  # === ATR 기반 동적 SL/TP (공격 롱 모드 — 손절 최대한 안치도록 wider) ===
  atr_sl_multiplier: 2.5        # 2.0 → 2.5 (SL 더 멀리 = 노이즈 내성 ↑)
  atr_tp_multiplier: 4.0        # 3.5 → 4.0 (RR 1.6:1 유지)
  sl_floor_pct: 0.015           # 1.0 → 1.5% (최소 SL 넓힘)
  sl_cap_pct: 0.040             # 3.0 → 4.0% (최대 SL 확장)

  dynamic_leverage:
    enabled: true
    base: 2                     # 3 → 2 (레버리지 하향 — SL 히트 방어)
    min: 2                      # 약한 시그널도 2x 유지
    max: 3                      # 5 → 3 (공격 롱은 레버리지 대신 holding으로)

  # === 종목별 스캘핑 프로파일 (ATR fallback용) ===
  scalp_profiles:
    BTC:
      tp_pct: 0.018       # 1.8% TP
      sl_pct: 0.010       # 1.0% SL (RR 1.8:1)
      priority: 2
    ETH:
      tp_pct: 0.020       # 2.0% TP
      sl_pct: 0.012       # 1.2% SL (RR 1.67:1)
      priority: 3
    SOL:
      tp_pct: 0.025       # 2.5% TP
      sl_pct: 0.015       # 1.5% SL (RR 1.67:1)
      priority: 1
    DOGE:
      tp_pct: 0.025       # 2.5% TP
      sl_pct: 0.015       # 1.5% SL (RR 1.67:1)
      priority: 4
    # 상장 시그널 코인
    LISTING:
      tp_pct: 0.050       # 5.0% TP (큰 움직임 기대)
      sl_pct: 0.020       # 2.0% SL
      priority: 0          # 최우선

trailing_stop:
  # fallback (trade_profiles 없을 때)
  activate_pct: 0.015
  distance_pct: 0.008
  step_pct: 0.004

# === 공격 롱 + 시간 기반 가드 전략 (2026-04-18 재조정) ===
# "손절 최대한 안치고 오래 hold" 방향 — SL 넓히고 max_hold를 시간 가드로 전환
trade_profiles:
  scalp:
    sources: ["ML", "ML_val", "MOM", "RSI_extreme", "RL", "EXT", "EXT_boost"]
    max_risk_pct: 0.06     # 4% → 6% (1거래 risk budget 완화)
    sl_pct: 0.015          # 1.0 → 1.5% SL
    tp_pct: 0.030          # 1.5 → 3.0% TP (RR 2.0:1)
    sl_floor_pct: 0.015
    sl_cap_pct: 0.025
    atr_sl_multiplier: 2.0  # 1.5 → 2.0 (SL 멀리)
    atr_tp_multiplier: 4.0  # 3.0 → 4.0
    trailing:
      activate_pct: 0.015   # 1.5% 수익 시 트레일링 활성화 (기존 1%)
      distance_pct: 0.012   # 0.8% → 1.2% (찔끔 방지 강화)
      step_pct: 0.004
    max_hold_minutes: 240   # 60 → 240 (4시간 — SL 대신 시간 가드로 방어)

ml:
  retrain_interval_hours: 24
  lookback_days: 2400    # 크립토 선물 전체 역사 (~2019-11~)
  train_split: 0.8
  min_accuracy: 0.55
  features:
    - rsi
    - macd
    - bbands
    - atr
    - volume_profile
    - funding_rate

rl:
  total_timesteps: 100000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  gamma: 0.99
  reward_type: "sharpe"

backtest:
  initial_capital: 200
  commission_pct: 0.0004
  slippage_pct: 0.0001
  start_date: "2024-01-01"
  end_date: "2025-01-01"

external:
  enabled: true
  weight: 0.2              # 외부 요인 가중치 완화 (0.3→0.2, 매크로 영향 축소)
  update_interval_min: 15
  sources:
    fear_greed: true
    news: true
    sentiment: true
    onchain: true
    macro: true
    social: true
    seasonal_cycle: true      # 10년 BTC 계절 패턴 (반감기/Dec-Feb 반등)
    derivatives: true          # 펀딩비/OI/롱숏비율 (Binance)
    multi_timeframe: true      # 멀티타임프레임 합류 분석
  sentiment:
    method: "vader"
    crypto_lexicon: true
  signal_thresholds:
    strong_bullish: 0.4     # 0.3 → 0.4 (더 강해야 신호로 인정)
    strong_bearish: -0.4    # 0.3 → 0.4
    event_override: false   # 고임팩트 오버라이드 해제 — 매크로가 진입 방해하지 않게

# =============================================================================
# Capital Tier System — 시드 구간별 기능 자동 활성화
# =============================================================================
# 실 LIVE 잔고가 커지면 상위 티어 기능이 자동으로 켜진다.
# PAPER는 paper_virtual_seed (가상 시드)로 상위 티어 기능을 실시간으로
# 선행 검증 — 실 자본 투입 전에 Kelly/HMM/메타라벨링을 paper에서 증명.
#
# 현재: LIVE=~$100 (micro 티어) / PAPER=$10K 가상 (mid 티어) → Kelly+BTC 검증
# =============================================================================
capital_tiers:
  # PAPER가 가정하는 가상 시드 ($). 상위 티어 기능을 실시간 시장에서 검증.
  # $5K → mid 티어 (Kelly + BTC + CVaR)를 먼저 paper로 증명 후 $15K→large로 상향 권장
  paper_virtual_seed: 5000
  paper_use_virtual: true     # false면 PAPER 실 equity로 티어 결정

  tiers:
    - name: micro
      min: 0
      max: 500
      description: "소시드 집중매매 ($0~$500) — 1포지션 풀시드, 알트 위주 공격 롱"
      features:
        symbols: ["ETH/USDT:USDT", "SOL/USDT:USDT", "DOGE/USDT:USDT"]
        max_positions: 1
        concentration_mode: true
        sizing_method: kelly_fractional   # micro부터 Kelly 활성 ($100K 빠른 도달)
        order_routing: market_only
        kelly_enabled: true
        kelly_fraction: 0.35              # 공격적 (낮은 시드 = 빠른 성장 필요)
        limit_order_pref: false
        hmm_regime: false
        meta_labeling: false
        walk_forward_cv: false
        cvar_risk: false
        stat_arb_pairs: false
        max_leverage: 3                   # 공격 롱은 레버리지 낮추고 holding으로

    - name: small
      min: 500
      max: 2000
      description: "소형 시드 ($500~$2K) — 2포지션 + 알트 확장"
      features:
        symbols: ["ETH/USDT:USDT", "SOL/USDT:USDT", "DOGE/USDT:USDT", "XRP/USDT:USDT"]
        max_positions: 2
        concentration_mode: false
        sizing_method: kelly_fractional
        order_routing: limit_first
        kelly_enabled: true
        kelly_fraction: 0.30
        limit_order_pref: true
        hmm_regime: false
        meta_labeling: false
        walk_forward_cv: true
        cvar_risk: false
        stat_arb_pairs: false
        max_leverage: 3

    - name: mid
      min: 2000
      max: 10000
      description: "중형 시드 ($2K~$10K) — Kelly + BTC 재진입 + CVaR"
      features:
        symbols: ["BTC/USDT:USDT", "ETH/USDT:USDT", "SOL/USDT:USDT", "DOGE/USDT:USDT", "XRP/USDT:USDT"]
        max_positions: 3
        concentration_mode: false
        sizing_method: kelly_fractional
        order_routing: limit_first
        kelly_enabled: true
        kelly_fraction: 0.25
        limit_order_pref: true
        hmm_regime: false
        meta_labeling: false
        walk_forward_cv: true
        cvar_risk: true
        stat_arb_pairs: false
        max_leverage: 3

    - name: large
      min: 10000
      max: 50000
      description: "대형 시드 ($10K~$50K) — HMM + 메타라벨링 + TWAP + 적극 모드"
      features:
        symbols:
          - "BTC/USDT:USDT"
          - "ETH/USDT:USDT"
          - "SOL/USDT:USDT"
          - "DOGE/USDT:USDT"
          - "BNB/USDT:USDT"
          - "XRP/USDT:USDT"
        max_positions: 5
        concentration_mode: false
        sizing_method: kelly_fractional
        order_routing: twap
        kelly_enabled: true
        kelly_fraction: 0.20            # 0.30 → 0.20 (시드↑ = 보수화)
        limit_order_pref: true
        hmm_regime: true
        meta_labeling: true
        walk_forward_cv: true
        cvar_risk: true
        stat_arb_pairs: false
        max_leverage: 3

    - name: pro
      min: 50000
      max: .inf
      description: "프로 ($50K+) — 풀 포트폴리오 + 통계차익 + 수확 모드($100K→)"
      features:
        symbols:
          - "BTC/USDT:USDT"
          - "ETH/USDT:USDT"
          - "SOL/USDT:USDT"
          - "DOGE/USDT:USDT"
          - "BNB/USDT:USDT"
          - "XRP/USDT:USDT"
          - "AVAX/USDT:USDT"
          - "ARB/USDT:USDT"
        max_positions: 8
        concentration_mode: false
        sizing_method: hrp
        order_routing: smart
        kelly_enabled: true
        kelly_fraction: 0.12             # 0.35 → 0.12 (수확 모드, $100K 타겟 달성 근접)
        limit_order_pref: true
        hmm_regime: true
        meta_labeling: true
        walk_forward_cv: true
        cvar_risk: true
        stat_arb_pairs: true
        max_leverage: 3

dashboard:
  host: "0.0.0.0"
  port: 8888

logging:
  level: "INFO"
  file: "logs/autotrader.log"
