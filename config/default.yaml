# AutoTrader AI Configuration
# === 소시드 집중 스캘핑 모드 ($188) ===

exchanges:
  binance:
    api_key: ${BINANCE_API_KEY}
    secret: ${BINANCE_SECRET}
    testnet: false
    options:
      defaultType: future
  bybit:
    api_key: ${BYBIT_API_KEY}
    secret: ${BYBIT_SECRET}
    testnet: true
    options:
      defaultType: future

trading:
  symbols:
    # BTC 제외: 시드 $10K 미만에서는 변동성 대비 수익 비효율
    # BTC 일중범위 3.5% vs SOL 5.8% → 같은 돈으로 65% 더 벌 수 있음
    # BTC는 시드 $10K 이상에서 재활성화
    #- "BTC/USDT:USDT"
    - "ETH/USDT:USDT"
    - "SOL/USDT:USDT"
    - "DOGE/USDT:USDT"
  timeframes:
    - "5m"
    - "15m"
    - "1h"
    - "4h"
  leverage: 3
  mode: "dual"  # backtest / paper / live / dual (Paper+Live 동시)
  min_confidence: 0.40     # 최소 확신도 (적응형: 장기 hold 시 0.25까지 하향)
  signal_threshold: 0.10   # ML 시그널 방향 결정 임계값
  min_confirming_signals: 2  # 최소 2개 시그널 합의 필요 (다중확인)

  # === 집중 매매 모드 ===
  # 소시드($188)에서는 분산 X → 가장 강한 신호 1개에 풀시드 집중
  concentration_mode: true
  max_concurrent_live: 1   # LIVE: 한 번에 1포지션만 (풀시드 올인)
  max_concurrent_paper: 4  # PAPER: 학습용으로 다중 가능

risk:
  max_position_pct: 0.95        # 풀시드 집중: $188 × 95% = $178.6 마진
  min_order_notional: 5         # 알트코인 최소 $5
  max_daily_loss_pct: 0.05      # 일 최대 손실 5%
  max_drawdown_pct: 0.15        # MDD 15%
  stop_loss_pct: 0.015          # 1.5% SL (fallback — ATR 없을 때만)
  take_profit_pct: 0.025        # 2.5% TP (fallback — ATR 없을 때만)
  max_open_positions: 1         # LIVE 1포지션 제한
  cooldown_after_losses: 2
  cooldown_minutes: 30

  # === ATR 기반 동적 SL/TP (핵심) ===
  atr_sl_multiplier: 2.0        # SL = ATR(14) × 2.0 (노이즈 회피)
  atr_tp_multiplier: 3.5        # TP = ATR(14) × 3.5 (RR 1.75:1)
  sl_floor_pct: 0.005           # SL 최소 0.5% (슬리피지 보호)
  sl_cap_pct: 0.030             # SL 최대 3.0% (최대 손실 제한)

  dynamic_leverage:
    enabled: true
    base: 3                     # $188 × 3x = $564 notional
    min: 2                      # 약한 시그널: 2x ($376)
    max: 5                      # 강한 시그널: 5x ($940)

  # === 종목별 스캘핑 프로파일 (ATR fallback용) ===
  scalp_profiles:
    BTC:
      tp_pct: 0.018       # 1.8% TP
      sl_pct: 0.010       # 1.0% SL (RR 1.8:1)
      priority: 2
    ETH:
      tp_pct: 0.020       # 2.0% TP
      sl_pct: 0.012       # 1.2% SL (RR 1.67:1)
      priority: 3
    SOL:
      tp_pct: 0.025       # 2.5% TP
      sl_pct: 0.015       # 1.5% SL (RR 1.67:1)
      priority: 1
    DOGE:
      tp_pct: 0.025       # 2.5% TP
      sl_pct: 0.015       # 1.5% SL (RR 1.67:1)
      priority: 4
    # 상장 시그널 코인
    LISTING:
      tp_pct: 0.050       # 5.0% TP (큰 움직임 기대)
      sl_pct: 0.020       # 2.0% SL
      priority: 0          # 최우선

trailing_stop:
  # 이전: 0.8% 활성화, 0.5% 거리 → 실질 0.3%에서 튕김 → 재진입 반복
  # 수정: 더 여유롭게 → 추세를 더 오래 타고 수수료 절약
  activate_pct: 0.015    # 1.5% 수익 시 트레일링 활성화 (TP 근처)
  distance_pct: 0.008    # 최고점에서 0.8% 하락 시 청산
  step_pct: 0.004        # SL을 0.4% 단위로 끌어올림
  # 실질 최소 수익: 1.5% - 0.8% = 0.7% 보장
  # 추세 지속 시: 트레일링이 따라가며 수익 극대화

ml:
  retrain_interval_hours: 24
  lookback_days: 90
  train_split: 0.8
  min_accuracy: 0.55
  features:
    - rsi
    - macd
    - bbands
    - atr
    - volume_profile
    - funding_rate

rl:
  total_timesteps: 100000
  learning_rate: 0.0003
  n_steps: 2048
  batch_size: 64
  gamma: 0.99
  reward_type: "sharpe"

backtest:
  initial_capital: 200
  commission_pct: 0.0004
  slippage_pct: 0.0001
  start_date: "2024-01-01"
  end_date: "2025-01-01"

external:
  enabled: true
  weight: 0.3              # 외부 요인이 최종 결정에 미치는 가중치 (0~1)
  update_interval_min: 15   # 외부 데이터 업데이트 주기 (분)
  sources:
    fear_greed: true
    news: true
    sentiment: true
    onchain: true
    macro: true
    social: true
    seasonal_cycle: true      # 10년 BTC 계절 패턴 (반감기/Dec-Feb 반등)
    derivatives: true          # 펀딩비/OI/롱숏비율 (Binance)
    multi_timeframe: true      # 멀티타임프레임 합류 분석
  sentiment:
    method: "vader"         # vader (경량) / keyword (초경량)
    crypto_lexicon: true    # 크립토 특화 사전 사용
  signal_thresholds:
    strong_bullish: 0.3     # 강한 매수 신호
    strong_bearish: -0.3    # 강한 매도 신호
    event_override: true    # 고임팩트 이벤트 시 기술적 분석 오버라이드

dashboard:
  host: "0.0.0.0"
  port: 8888

logging:
  level: "INFO"
  file: "logs/autotrader.log"
